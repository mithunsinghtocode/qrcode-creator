<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Free tool to instantly generate beautiful, high-quality QR codes from URLs, text, or locations. Download as PNG directly in your browser.">
    <meta name="keywords" content="QR code creator, QR code generator, create QR code, download QR code, simple QR code, custom QR code">
    <meta name="author" content="QR Creator">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://mithunsinghtocode.github.io/qrcode-creator/">
    
    <!-- Open Graph for Social Sharing -->
    <meta property="og:title" content="QR Code Creator - Instant & Free">
    <meta property="og:description" content="Generate beautiful, high-quality QR codes instantly. No sign-up required.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://mithunsinghtocode.github.io/qrcode-creator/">
    
    <title>Free QR Code Creator | Generate & Download Instantly</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Styles CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- QRCode.js Library -->
    <script src="https://unpkg.com/qrcode@1.4.4/build/qrcode.min.js"></script>
</head>
<body>
    <div class="background-elements">
        <div class="blob shape-1"></div>
        <div class="blob shape-2"></div>
        <div class="blob shape-3"></div>
    </div>

    <main class="app-container">
        <header>
            <div class="logo">
                <i class="ph-fill ph-qr-code"></i>
            </div>
            <h1>QR Creator</h1>
            <p>Generate beautiful QR codes instantly</p>
        </header>

        <section class="input-section">
            <div class="input-group">
                <i class="ph ph-link input-icon"></i>
                <input type="text" id="qr-input" placeholder="Enter URL or text location" autocomplete="off">
            </div>
            <button id="generate-btn" class="primary-btn">
                <span>Generate</span>
                <i class="ph-bold ph-magic-wand"></i>
            </button>
        </section>

        <section class="result-section hidden" id="result-section">
            <div class="qr-container">
                <div class="qr-wrapper" id="qr-wrapper">
                    <canvas id="qr-canvas"></canvas>
                </div>
            </div>
            <div class="action-buttons">
                <button id="download-btn" class="secondary-btn">
                    <i class="ph-bold ph-download-simple"></i>
                    <span>Download PNG</span>
                </button>
                <button id="reset-btn" class="icon-btn" aria-label="Create New">
                    <i class="ph-bold ph-arrow-counter-clockwise"></i>
                </button>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
